name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen:check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/greptimedb
        with:
          container-name: greptimedb
      - run: pnpm test:integration
        env:
          GREPTIMEDB_ENDPOINT: localhost:4001
          GREPTIMEDB_HTTP: http://127.0.0.1:4000
      - name: Dump GreptimeDB logs on failure
        if: failure()
        run: docker logs greptimedb
      - name: Stop GreptimeDB
        if: always()
        run: docker rm -f greptimedb || true

  bun-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/greptimedb
        with:
          container-name: greptimedb-bun
      - run: bun run scripts/smoke.ts
        env:
          GREPTIMEDB_ENDPOINT: localhost:4001
          GREPTIMEDB_HTTP: http://127.0.0.1:4000
      - name: Dump GreptimeDB logs on failure
        if: failure()
        run: docker logs greptimedb-bun
      - name: Stop GreptimeDB
        if: always()
        run: docker rm -f greptimedb-bun || true

  deno-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm install --frozen-lockfile
      - uses: ./.github/actions/greptimedb
        with:
          container-name: greptimedb-deno
      - run: deno run -A scripts/smoke.ts
        env:
          GREPTIMEDB_ENDPOINT: localhost:4001
          GREPTIMEDB_HTTP: http://127.0.0.1:4000
      - name: Dump GreptimeDB logs on failure
        if: failure()
        run: docker logs greptimedb-deno
      - name: Stop GreptimeDB
        if: always()
        run: docker rm -f greptimedb-deno || true
